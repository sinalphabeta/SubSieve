services:
  gateway:
    build: ./gateway
    container_name: subscribe-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:54444:54444"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - V2B_BACKEND=${V2B_BACKEND}
      - V2B_HOST=${V2B_HOST}
      - SUBSCRIBE_PATH=${SUBSCRIBE_PATH:-/api/v1/client/subscribe}
    volumes:
      - gw_config:/etc/nginx/subscribe
      - gw_logs:/var/log/subscribe

  admin:
    build: ./admin
    container_name: subscribe-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:64444:64444"
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS}
      - ADMIN_SECRET_PATH=${ADMIN_SECRET_PATH}
    volumes:
      - gw_config:/etc/nginx/subscribe
      - gw_logs:/var/log/subscribe

volumes:
  gw_config:
  gw_logs:
