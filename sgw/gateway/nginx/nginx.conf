user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_user_agent"';

    access_log  /var/log/subscribe/access.log  main;
    error_log   /var/log/subscribe/error.log   warn;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from fc00::/7;
    include /etc/nginx/subscribe/trusted_proxy.conf;

    # DNS 解析器：放在 http 块才能对 proxy_pass 变量生效
    # valid=60s 缓存解析结果 60 秒，上游 IP 变动时自动重新解析
    resolver 1.1.1.1 valid=60s ipv6=off;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 云IP识别 + UA规则 + 速率限制（由 update_cloud_geo.sh 生成）
    include /etc/nginx/subscribe/cloud_geo.conf;

    # 白名单geo块（由 reload_whitelist.sh 生成）
    include /etc/nginx/subscribe/whitelist.conf;

    # 自定义封禁UA（由 admin 写入）
    include /etc/nginx/subscribe/ua_custom.conf;

    # UA白名单（由 admin 写入，优先级高于封禁UA）
    include /etc/nginx/subscribe/ua_whitelist.conf;

    server {
        listen 80 default_server;
        return 444;
    }

    server {
        listen 54444 default_server;

        # 黑名单（deny规则，由admin实时写入）
        include /etc/nginx/subscribe/blacklist.conf;

        # 订阅拦截规则
        include /etc/nginx/subscribe/protect.conf;

        location / { return 444; }
    }
}
